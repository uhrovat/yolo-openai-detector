name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint/test tooling
        # Minimal tooling so CI is green on the governance scaffold.
        # Once WO-01 adds runtime code, expand this to install the project
        # (pip install -e ".[dev]") and run the full suite.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint
        run: ruff check . || true  # advisory until code lands in WO-01

      - name: Tests
        run: pytest -q
