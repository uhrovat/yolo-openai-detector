name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project + CI tooling
        # Installs runtime deps (onnxruntime, pillow, numpy, fastapi, …) plus
        # test/lint tools (pytest, httpx, openai, ruff) — no torch/ultralytics.
        # Detection tests skip automatically when models/yolo11n.onnx is absent.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ci]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q
